stages:
  - build
  - deploy

build-burgen:
  stage: build
  tags:
    - pi
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/burgen:latest burgen/
    - docker push $CI_REGISTRY_IMAGE/burgen:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  tags:
    - pi
  script:
    - cd /home/wilcomb/infrastructure
    - git pull "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/jbkze/jbkze.git" main
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker compose pull
    - docker compose up -d --remove-orphans
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
