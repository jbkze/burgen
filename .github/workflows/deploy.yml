name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-burgen:
    runs-on: [self-hosted, pi]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push burgen image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/burgen:latest burgen/
          docker push ghcr.io/${{ github.repository }}/burgen:latest

  deploy:
    needs: build-burgen
    runs-on: [self-hosted, pi]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Update host checkout and restart stack
        run: |
          cd /home/wilcomb/infrastructure
          git pull "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker compose pull
          docker compose up -d --remove-orphans
